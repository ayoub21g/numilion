<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Numilion — Admin</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase.js"></script>
  <style>
    .admin-page { max-width:860px; margin:0 auto; padding:30px 20px 60px; position:relative; z-index:1; }
    .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-box { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:24px; padding:48px 40px; width:100%; max-width:400px; backdrop-filter:blur(12px); box-shadow:0 30px 80px rgba(0,0,0,0.5); }
    .login-box .brand { font-size:1.8rem; font-weight:700; background:linear-gradient(135deg,#e94560,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .avatar-wrap { text-align:center; margin-bottom:28px; }
    .avatar { width:90px; height:90px; border-radius:50%; margin:0 auto 12px; background:rgba(255,255,255,0.06); border:2px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:2.5rem; overflow:hidden; }
    .avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .avatar-upload-btn { display:inline-block; padding:7px 18px; border-radius:50px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#aaa; font-size:0.82rem; cursor:pointer; }
    .panel-avatar { width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.06); border:2px solid rgba(233,69,96,0.4); display:flex; align-items:center; justify-content:center; font-size:1.2rem; overflow:hidden; flex-shrink:0; }
    .panel-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    label { display:block; color:#888; font-size:0.82rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
    input[type="text"], input[type="password"], input[type="url"] { width:100%; padding:12px 16px; border-radius:12px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff; font-size:0.95rem; margin-bottom:18px; font-family:inherit; transition:border-color 0.2s; }
    input:focus { outline:none; border-color:#e94560; }
    .btn-primary { width:100%; padding:13px; border-radius:50px; background:linear-gradient(135deg,#e94560,#a855f7); color:#fff; border:none; font-size:1rem; font-weight:600; cursor:pointer; font-family:inherit; }
    .error-msg { color:#e94560; font-size:0.85rem; margin-bottom:14px; }
    .panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; padding-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.07); }
    .panel-header .brand { font-size:1.4rem; font-weight:700; background:linear-gradient(135deg,#e94560,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .panel-header-actions { display:flex; gap:10px; align-items:center; }
    .btn-sm { padding:8px 18px; border-radius:50px; font-size:0.85rem; font-weight:600; cursor:pointer; border:none; font-family:inherit; transition:all 0.2s; }
    .btn-outline { background:transparent; border:1px solid rgba(255,255,255,0.15); color:#aaa; }
    .btn-outline:hover { background:rgba(255,255,255,0.08); color:#fff; }
    .btn-danger { background:rgba(233,69,96,0.15); color:#e94560; border:1px solid rgba(233,69,96,0.3); }
    .btn-danger:hover { background:#e94560; color:#fff; }
    .stats { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:32px; }
    .stat-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:20px; text-align:center; }
    .stat-card .stat-num { font-size:2rem; font-weight:700; background:linear-gradient(135deg,#e94560,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .stat-card .stat-label { color:#666; font-size:0.8rem; margin-top:4px; }
    .add-form { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:28px; margin-bottom:32px; }
    .add-form h3 { font-size:1rem; color:#ccc; margin-bottom:20px; font-weight:600; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-full { grid-column:1/-1; }
    .add-msg { font-size:0.88rem; margin-bottom:14px; padding:10px 16px; border-radius:10px; }
    .add-msg.success { background:rgba(46,204,113,0.1); color:#2ecc71; border:1px solid rgba(46,204,113,0.2); }
    .add-msg.error { background:rgba(233,69,96,0.1); color:#e94560; border:1px solid rgba(233,69,96,0.2); }
    .list-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .list-header h3 { font-size:1rem; color:#ccc; font-weight:600; }
    .game-item { display:flex; align-items:center; gap:16px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:16px; margin-bottom:10px; }
    .game-item:hover { border-color:rgba(233,69,96,0.3); }
    .game-thumb { width:56px; height:56px; border-radius:12px; background:rgba(255,255,255,0.06); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.6rem; overflow:hidden; }
    .game-thumb img { width:100%; height:100%; object-fit:cover; border-radius:12px; }
    .game-info { flex:1; min-width:0; }
    .game-info strong { display:block; font-size:0.95rem; color:#eee; margin-bottom:3px; }
    .game-info span { font-size:0.8rem; color:#666; display:block; }
    .game-meta { display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }
    .badge { display:inline-flex; align-items:center; gap:5px; background:rgba(255,255,255,0.06); border-radius:50px; padding:4px 10px; font-size:0.78rem; color:#888; }
    .badge.views { color:#a855f7; background:rgba(168,85,247,0.1); }
    .badge.dl { color:#3b82f6; background:rgba(59,130,246,0.1); }
    .game-actions { display:flex; gap:8px; margin-top:4px; }
    .empty-list { text-align:center; color:#444; padding:40px; font-size:0.9rem; border:1px dashed rgba(255,255,255,0.07); border-radius:16px; }
    .hidden { display:none !important; }
    .profile-section { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:28px; margin-bottom:32px; }
    .profile-section h3 { font-size:1rem; color:#ccc; margin-bottom:20px; font-weight:600; }
    .profile-avatar-edit { display:flex; align-items:center; gap:20px; margin-bottom:20px; }
    .profile-avatar-big { width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,0.06); border:2px solid rgba(233,69,96,0.4); display:flex; align-items:center; justify-content:center; font-size:2rem; overflow:hidden; flex-shrink:0; }
    .profile-avatar-big img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="login-wrap" id="login-wrap">
    <div class="login-box">
      <div style="text-align:center;margin-bottom:20px">
        <img src="standard-2.gif" style="width:72px;height:72px;border-radius:50%;filter:drop-shadow(0 0 16px rgba(255,160,0,0.6))"/>
        <div class="brand" style="margin-top:10px">Numilion</div>
        <p style="color:#666;font-size:0.9rem;margin-top:6px">Accès réservé à l'administrateur</p>
      </div>
      <div id="login-error" class="error-msg hidden"></div>
      <div class="avatar-wrap">
        <div class="avatar" id="avatar-preview">👤</div>
        <label class="avatar-upload-btn" for="avatar-input">📷 Photo de profil</label>
        <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="previewAvatar(this)"/>
      </div>
      <label>Nom d'utilisateur</label>
      <input type="text" id="username" placeholder="ayoub"/>
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••"/>
      <button class="btn-primary" onclick="login()">Se connecter</button>
    </div>
  </div>

  <div class="admin-page hidden" id="panel">
    <div class="panel-header">
      <div class="brand"><img src="standard-2.gif" style="height:28px;vertical-align:middle;border-radius:50%;margin-right:8px"/>⚙️ Panel Admin</div>
      <div class="panel-header-actions">
        <div class="panel-avatar" id="panel-avatar">👤</div>
        <button class="btn-sm btn-outline" onclick="toggleProfileSection()">👤 Mon Profil</button>
        <a href="index.html"><button class="btn-sm btn-outline">🌐 Voir le site</button></a>
        <button class="btn-sm btn-danger" onclick="logout()">Déconnexion</button>
      </div>
    </div>

    <!-- Section Profil Admin -->
    <div class="profile-section hidden" id="profile-section">
      <h3>👤 Modifier mon profil admin</h3>
      <div id="profile-msg" class="hidden"></div>
      <div class="profile-avatar-edit">
        <div class="profile-avatar-big" id="profile-avatar-big">👤</div>
        <div>
          <label class="avatar-upload-btn" for="profile-avatar-input" style="display:inline-block;cursor:pointer">📷 Changer la photo</label>
          <input type="file" id="profile-avatar-input" accept="image/*" style="display:none" onchange="handleProfileAvatarChange(this)"/>
          <p style="color:#555;font-size:0.78rem;margin-top:6px">Ou colle une URL :</p>
          <input type="url" id="profile-avatar-url" placeholder="https://..." style="padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#fff;font-family:inherit;font-size:0.85rem;width:260px"/>
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>Nouveau nom d'utilisateur</label>
          <input type="text" id="profile-newuser" placeholder="Laisser vide pour ne pas changer"/>
        </div>
        <div>
          <label>Nouveau mot de passe</label>
          <input type="password" id="profile-newpass" placeholder="Laisser vide pour ne pas changer"/>
        </div>
      </div>
      <button class="btn-primary" style="width:auto;padding:12px 36px;margin-top:6px" onclick="saveAdminProfile()">💾 Sauvegarder</button>
    </div>

    <div class="stats">
      <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Jeux</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-views">0</div><div class="stat-label">Vues</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-dl">0</div><div class="stat-label">Téléchargements</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-users">0</div><div class="stat-label">Comptes</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-online">0</div><div class="stat-label">En ligne</div></div>
    </div>

    <div class="add-form">
      <h3>➕ Ajouter un jeu</h3>
      <div id="add-msg" class="hidden"></div>
      <div class="form-row">
        <div class="form-full">
          <label>Nom du jeu</label>
          <div style="display:flex;gap:10px;align-items:center">
            <input type="text" id="game-name" placeholder="Ex: Minecraft" style="margin-bottom:0" oninput="clearAutoFill()"/>
            <button type="button" class="btn-sm" style="background:linear-gradient(135deg,#e94560,#a855f7);color:#fff;border:none;white-space:nowrap;flex-shrink:0" onclick="autoFillGame()">✨ Auto-remplir</button>
          </div>
          <div id="autofill-preview" style="display:none;margin-top:12px;display:none;align-items:center;gap:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px">
            <img id="autofill-img-preview" src="" style="width:60px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0"/>
            <div style="font-size:0.85rem;color:#aaa" id="autofill-desc-preview"></div>
          </div>
        </div>
        <div>
          <label>Image (URL)</label>
          <input type="url" id="game-img" placeholder="https://..."/>
        </div>
        <div>
          <label>Lien de téléchargement</label>
          <input type="url" id="game-dl" placeholder="https://..."/>
        </div>
        <div class="form-full">
          <label>Description</label>
          <input type="text" id="game-desc" placeholder="Courte description"/>
        </div>
        <div>
          <label>Bande annonce (URL YouTube)</label>
          <input type="url" id="game-trailer" placeholder="https://youtube.com/watch?v=..."/>
        </div>
        <div>
          <label>Gameplay (URL YouTube)</label>
          <input type="url" id="game-gameplay" placeholder="https://youtube.com/watch?v=..."/>
        </div>
      </div>
      <button class="btn-primary" style="width:auto;padding:12px 36px;margin-top:6px" onclick="addGame()">Ajouter</button>
    </div>

    <div class="list-header">
      <h3>🕹️ Jeux (<span id="game-count">0</span>)</h3>
    </div>
    <div id="game-list"></div>

    <div class="list-header" style="margin-top:32px">
      <h3>📬 Demandes de jeux (<span id="req-count">0</span>)</h3>
    </div>
    <div id="req-list"></div>
  </div>

  <script>
    var YT_API_KEY = 'AIzaSyCk0lna6aTZP03UM0WRBA5tmjoIs1KnKKk';

    function clearAutoFill() {
      document.getElementById('autofill-preview').style.display = 'none';
    }

    function autoFillGame() {
      var name = document.getElementById('game-name').value.trim();
      if (!name) { alert('Entre d\'abord le nom du jeu.'); return; }
      var btn = event.target;
      btn.textContent = '⏳ Recherche...';
      btn.disabled = true;

      // Chercher sur Steam (API publique, pas de clé)
      fetch('https://store.steampowered.com/api/storesearch/?term=' + encodeURIComponent(name) + '&l=french&cc=FR')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.items && data.items.length > 0) {
            var game = data.items[0];
            var appid = game.id;
            var cover = 'https://cdn.cloudflare.steamstatic.com/steam/apps/' + appid + '/library_600x900.jpg';

            // Récupérer les détails du jeu pour la vraie description
            fetch('https://store.steampowered.com/api/appdetails?appids=' + appid + '&l=french&cc=FR')
              .then(function(r) { return r.json(); })
              .then(function(detail) {
                var desc = '';
                var d = detail[appid] && detail[appid].data;
                if (d && d.short_description) {
                  // Prendre les 8 premiers mots de la description officielle
                  desc = d.short_description.replace(/<[^>]+>/g, '').replace(/[™®]/g, '').trim().split(/\s+/).slice(0, 8).join(' ');
                } else {
                  desc = game.name.replace(/[™®]/g, '').trim().split(/\s+/).slice(0, 5).join(' ');
                }
                applyAutoFill(cover, desc, btn);
              })
              .catch(function() {
                var desc = game.name.replace(/[™®]/g, '').trim().split(/\s+/).slice(0, 5).join(' ');
                applyAutoFill(cover, desc, btn);
              });
          } else {
            fallbackYouTube(name, btn);
          }
        })
        .catch(function() { fallbackYouTube(name, btn); });
    }

    function fallbackYouTube(name, btn) {
      fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=1&q=' + encodeURIComponent(name + ' game trailer') + '&key=' + YT_API_KEY)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.items && data.items.length > 0) {
            var item = data.items[0].snippet;
            var cover = item.thumbnails.maxres ? item.thumbnails.maxres.url
                      : item.thumbnails.high ? item.thumbnails.high.url
                      : item.thumbnails.medium.url;
            var desc = item.title.replace(/[|:\-–—™®]/g, ' ').trim().split(/\s+/).slice(0, 5).join(' ');
            applyAutoFill(cover, desc, btn);
          } else {
            btn.textContent = '✨ Auto-remplir'; btn.disabled = false;
          }
        })
        .catch(function() { btn.textContent = '✨ Auto-remplir'; btn.disabled = false; });
    }

    function applyAutoFill(cover, desc, btn) {
      btn.textContent = '✨ Auto-remplir';
      btn.disabled = false;
      var imgField  = document.getElementById('game-img');
      var descField = document.getElementById('game-desc');
      if (!imgField.value)  imgField.value  = cover;
      if (!descField.value) descField.value = desc;
      var preview = document.getElementById('autofill-preview');
      document.getElementById('autofill-img-preview').src = cover;
      document.getElementById('autofill-desc-preview').textContent = desc;
      preview.style.display = 'flex';
    }

    function previewAvatar(input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        localStorage.setItem('numilion_avatar', e.target.result);
        const session = JSON.parse(localStorage.getItem('numilion_session') || 'null');
        if (session && session.role === 'admin') {
          session.avatar = e.target.result;
          localStorage.setItem('numilion_session', JSON.stringify(session));
        }
        setAvatar(e.target.result);
      };
      reader.readAsDataURL(input.files[0]);
    }

    function setAvatar(src) {
      const img = '<img src="'+src+'" alt="avatar"/>';
      const p = document.getElementById('avatar-preview');
      const pa = document.getElementById('panel-avatar');
      if (p) p.innerHTML = img;
      if (pa) pa.innerHTML = img;
    }

    const ADMIN_AVATAR = 'https://i.imgur.com/lRqkh3u.jpeg';
    const savedAvatar = localStorage.getItem('numilion_avatar') || ADMIN_AVATAR;
    if (savedAvatar) setAvatar(savedAvatar);

    function login() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (!u || !p) { const err = document.getElementById('login-error'); err.textContent = 'Remplis tous les champs.'; err.classList.remove('hidden'); return; }
      db.ref('admins/' + u).once('value', function(snap) {
        const admin = snap.val();
        if (admin && admin.pass === p) {
          const avatar = localStorage.getItem('numilion_avatar_' + u) || admin.avatar || 'https://i.imgur.com/lRqkh3u.jpeg';
          localStorage.setItem('numilion_session', JSON.stringify({ user: u, role: 'admin', avatar }));
          document.getElementById('login-wrap').classList.add('hidden');
          document.getElementById('panel').classList.remove('hidden');
          startPanel();
        } else {
          const err = document.getElementById('login-error');
          err.textContent = 'Identifiants incorrects.';
          err.classList.remove('hidden');
        }
      });
    }

    function logout() {
      localStorage.removeItem('numilion_session');
      window.location.href = 'login.html';
    }

    function showMsg(el, type, text) {
      el.className = 'add-msg ' + type;
      el.textContent = text;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 3000);
    }

    function addGame() {
      const name    = document.getElementById('game-name').value.trim();
      const img     = document.getElementById('game-img').value.trim();
      const dl      = document.getElementById('game-dl').value.trim();
      const desc    = document.getElementById('game-desc').value.trim();
      const trailer = document.getElementById('game-trailer').value.trim();
      const gameplay= document.getElementById('game-gameplay').value.trim();
      const msg     = document.getElementById('add-msg');
      if (!name) { showMsg(msg, 'error', 'Le nom est obligatoire.'); return; }
      const clearForm = () => ['game-name','game-img','game-dl','game-desc','game-trailer','game-gameplay'].forEach(id => document.getElementById(id).value = '');
      if (!dl) {
        saveGameToFirebase({ id: Date.now(), name, img, dl: '', desc, trailer, gameplay, views: 0, downloads: 0 });
        showMsg(msg, 'success', '"'+name+'" ajouté !'); clearForm(); return;
      }
      showMsg(msg, 'success', 'Création du lien lockr...');
      fetch('https://numilion.ayoubghe2010.workers.dev/', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: name, target: dl })
      })
      .then(r => r.json())
      .then(data => {
        const lockrUrl = data.data && data.data.id ? 'https://lockr.so/' + data.data.id : dl;
        saveGameToFirebase({ id: Date.now(), name, img, dl: lockrUrl, desc, trailer, gameplay, views: 0, downloads: 0 });
        showMsg(msg, 'success', '"'+name+'" ajouté avec lien lockr !'); clearForm();
      })
      .catch(() => {
        saveGameToFirebase({ id: Date.now(), name, img, dl, desc, trailer, gameplay, views: 0, downloads: 0 });
        showMsg(msg, 'success', '"'+name+'" ajouté !'); clearForm();
      });
    }

    function deleteGame(id) {
      if (!confirm('Supprimer ce jeu ?')) return;
      deleteGameFromFirebase(id);
    }

    function incrementDl(id) { updateGameStatFirebase(id, 'downloads'); }

    function editGame(g) {
      const item = document.getElementById('item-' + g.id);
      item.innerHTML = `
        <div style="flex:1;display:flex;flex-direction:column;gap:10px">
          <input type="text" id="edit-name-${g.id}" value="${g.name}" placeholder="Nom" style="padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#fff;font-family:inherit;font-size:0.9rem"/>
          <input type="text" id="edit-img-${g.id}" value="${g.img||''}" placeholder="URL image" style="padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#fff;font-family:inherit;font-size:0.9rem"/>
          <input type="text" id="edit-dl-${g.id}" value="${g.dl||''}" placeholder="Lien téléchargement" style="padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#fff;font-family:inherit;font-size:0.9rem"/>
          <input type="text" id="edit-desc-${g.id}" value="${g.desc||''}" placeholder="Description" style="padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#fff;font-family:inherit;font-size:0.9rem"/>
          <input type="text" id="edit-trailer-${g.id}" value="${g.trailer||''}" placeholder="Bande annonce YouTube (URL)" style="padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#fff;font-family:inherit;font-size:0.9rem"/>
          <input type="text" id="edit-gameplay-${g.id}" value="${g.gameplay||''}" placeholder="Gameplay YouTube (URL)" style="padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#fff;font-family:inherit;font-size:0.9rem"/>
          <div style="display:flex;gap:8px">
            <button class="btn-sm btn-primary" style="background:linear-gradient(135deg,#e94560,#a855f7);color:#fff;border:none" onclick="saveEdit(${g.id})">✅ Sauvegarder</button>
            <button class="btn-sm btn-outline" onclick="startPanel()">Annuler</button>
          </div>
        </div>`;
    }

    function saveEdit(id) {
      const name     = document.getElementById('edit-name-'+id).value.trim();
      const img      = document.getElementById('edit-img-'+id).value.trim();
      const dl       = document.getElementById('edit-dl-'+id).value.trim();
      const desc     = document.getElementById('edit-desc-'+id).value.trim();
      const trailer  = document.getElementById('edit-trailer-'+id).value.trim();
      const gameplay = document.getElementById('edit-gameplay-'+id).value.trim();
      if (!name) return;
      db.ref('games/'+id).update({ name, img, dl, desc, trailer, gameplay });
    }

    function acceptRequest(id, name, img) {
      db.ref('requests/'+id).once('value').then(function(snap) {
        var r = snap.val();
        db.ref('requests/'+id).update({ status: 'accepted' });
        // Notifier l'utilisateur
        if (r && r.user && r.user !== 'Visiteur') {
          db.ref('notifications/' + r.user).push({
            type: 'accepte',
            game: name,
            comment: 'Ton jeu sera bientôt disponible sur le site !',
            date: new Date().toLocaleDateString('fr-FR'),
            read: false
          });
        }
      });
      document.getElementById('game-name').value = name;
      document.getElementById('game-img').value = img || '';
      document.getElementById('game-dl').value = '';
      document.getElementById('game-desc').value = '';
      document.getElementById('game-name').scrollIntoView({ behavior: 'smooth' });
    }

    function rejectRequest(id, username, gameName) {
      var comment = prompt('Raison du refus (optionnel) :') || '';
      db.ref('requests/'+id).update({ status: 'rejected', comment: comment });
      // Envoyer notification à l'utilisateur
      if (username && username !== 'Visiteur') {
        db.ref('notifications/' + username).push({
          type: 'refus',
          game: gameName,
          comment: comment || 'Aucune raison fournie.',
          date: new Date().toLocaleDateString('fr-FR'),
          read: false
        });
      }
    }

    function startPanel() {
      // Stats en temps réel
      db.ref('online').on('value', snap => {
        document.getElementById('stat-online').textContent = snap.numChildren();
      });
      countUsersFirebase(n => document.getElementById('stat-users').textContent = n);

      // Jeux en temps réel
      loadGamesFromFirebase(function(games) {
        const totalViews = games.reduce((s,g) => s+(g.views||0), 0);
        const totalDl    = games.reduce((s,g) => s+(g.downloads||0), 0);
        document.getElementById('stat-total').textContent = games.length;
        document.getElementById('stat-views').textContent = totalViews;
        document.getElementById('stat-dl').textContent    = totalDl;
        document.getElementById('game-count').textContent = games.length;

        const list = document.getElementById('game-list');
        if (!games.length) { list.innerHTML = '<div class="empty-list">Aucun jeu ajouté.</div>'; return; }
        list.innerHTML = games.map(g => `
          <div class="game-item" id="item-${g.id}">
            <div class="game-thumb">${g.img ? `<img src="${g.img}" onerror="this.parentElement.textContent='🎮'"/>` : '🎮'}</div>
            <div class="game-info">
              <strong>${g.name}</strong>
              <span>${g.desc||''}</span>
            </div>
            <div class="game-meta">
              <div style="display:flex;gap:6px">
                <span class="badge views">👁 ${g.views||0}</span>
                <span class="badge dl">⬇️ ${g.downloads||0}</span>
              </div>
              <div class="game-actions">
                <button class="btn-sm" style="background:rgba(168,85,247,0.15);color:#a855f7;border:1px solid rgba(168,85,247,0.3)" onclick='editGame(${JSON.stringify(g)})'>✏️ Modifier</button>
                <button class="btn-sm btn-danger" onclick="deleteGame(${g.id})">🗑</button>
              </div>
            </div>
          </div>`).join('');
      });

      // Demandes en temps réel
      db.ref('requests').on('value', function(snap) {
        var reqs = [];
        snap.forEach(function(c) { reqs.push(c.val()); });
        document.getElementById('req-count').textContent = reqs.filter(r=>r.status==='pending').length;
        var list = document.getElementById('req-list');
        if (!reqs.length) { list.innerHTML = '<div class="empty-list">Aucune demande.</div>'; return; }
        list.innerHTML = reqs.reverse().map(function(r) {
          var statusBadge = r.status === 'pending'
            ? '<span style="background:rgba(255,160,0,0.15);color:#ffa000;border:1px solid rgba(255,160,0,0.3);padding:3px 10px;border-radius:50px;font-size:0.75rem">⏳ En attente</span>'
            : r.status === 'accepted'
            ? '<span style="background:rgba(46,204,113,0.15);color:#2ecc71;border:1px solid rgba(46,204,113,0.3);padding:3px 10px;border-radius:50px;font-size:0.75rem">✅ Accepté</span>'
            : '<span style="background:rgba(233,69,96,0.15);color:#e94560;border:1px solid rgba(233,69,96,0.3);padding:3px 10px;border-radius:50px;font-size:0.75rem">❌ Refusé</span>';
          return '<div class="game-item" id="req-'+r.id+'">'
            + '<div class="game-thumb">'+(r.img ? '<img src="'+r.img+'" onerror="this.parentElement.textContent=\'🎮\'"/>' : '🎮')+'</div>'
            + '<div class="game-info"><strong>'+r.name+'</strong><span>Par '+r.user+' · '+r.date+(r.msg?' · '+r.msg:'')+'</span>'
            + (r.comment ? '<span style="color:#e94560;font-size:0.78rem">Refus : '+r.comment+'</span>' : '')
            + '</div>'
            + '<div class="game-meta"><div>'+statusBadge+'</div>'
            + (r.status==='pending' ? '<div class="game-actions">'
              + '<button class="btn-sm" style="background:rgba(46,204,113,0.15);color:#2ecc71;border:1px solid rgba(46,204,113,0.3)" onclick="acceptRequest('+r.id+',\''+r.name+'\',\''+r.img+'\')">✅ Accepter</button>'
              + '<button class="btn-sm btn-danger" onclick="rejectRequest('+r.id+',\''+r.user+'\',\''+r.name+'\')">❌ Refuser</button>'
              + '</div>' : '')
            + '</div></div>';
        }).join('');
      });
    }

    function toggleProfileSection() {
      var s = document.getElementById('profile-section');
      s.classList.toggle('hidden');
      if (!s.classList.contains('hidden')) {
        // Pré-remplir avec les infos actuelles
        var session = JSON.parse(localStorage.getItem('numilion_session') || 'null');
        if (session) {
          document.getElementById('profile-newuser').value = '';
          document.getElementById('profile-newpass').value = '';
          document.getElementById('profile-avatar-url').value = '';
          // Afficher avatar actuel
          var avatar = localStorage.getItem('numilion_avatar_' + session.user) || session.avatar || 'https://i.imgur.com/lRqkh3u.jpeg';
          var big = document.getElementById('profile-avatar-big');
          big.innerHTML = '<img src="' + avatar + '" alt="avatar"/>';
        }
      }
    }

    function handleProfileAvatarChange(input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('profile-avatar-big').innerHTML = '<img src="' + e.target.result + '" alt="avatar"/>';
        document.getElementById('profile-avatar-url').value = '';
      };
      reader.readAsDataURL(input.files[0]);
    }

    function saveAdminProfile() {
      var session = JSON.parse(localStorage.getItem('numilion_session') || 'null');
      if (!session || session.role !== 'admin') return;
      var currentUser = session.user;
      var newUser = document.getElementById('profile-newuser').value.trim();
      var newPass = document.getElementById('profile-newpass').value;
      var avatarUrl = document.getElementById('profile-avatar-url').value.trim();
      var fileInput = document.getElementById('profile-avatar-input');
      var msgEl = document.getElementById('profile-msg');

      function applyChanges(avatarData) {
        var updates = {};
        var targetUser = newUser || currentUser;

        if (newPass) updates.pass = newPass;
        if (avatarData) updates.avatar = avatarData;

        // Si changement de nom : créer nouveau nœud, supprimer l'ancien
        if (newUser && newUser !== currentUser) {
          db.ref('admins/' + currentUser).once('value', function(snap) {
            var existing = snap.val() || {};
            var merged = Object.assign({}, existing, updates, { user: newUser });
            db.ref('admins/' + newUser).set(merged);
            db.ref('admins/' + currentUser).remove();
            // Mettre à jour la session
            session.user = newUser;
            if (avatarData) session.avatar = avatarData;
            localStorage.setItem('numilion_session', JSON.stringify(session));
            if (avatarData) localStorage.setItem('numilion_avatar_' + newUser, avatarData);
            showProfileMsg('success', 'Profil mis à jour ! Reconnecte-toi.');
            setTimeout(function() { logout(); }, 1500);
          });
        } else {
          if (Object.keys(updates).length === 0) { showProfileMsg('error', 'Aucune modification.'); return; }
          db.ref('admins/' + currentUser).update(updates);
          if (avatarData) {
            session.avatar = avatarData;
            localStorage.setItem('numilion_avatar_' + currentUser, avatarData);
          }
          localStorage.setItem('numilion_session', JSON.stringify(session));
          // Mettre à jour l'avatar affiché
          if (avatarData) { setAvatar(avatarData); }
          showProfileMsg('success', 'Profil mis à jour !');
        }
      }

      // Priorité : fichier > URL > rien
      if (fileInput.files && fileInput.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => applyChanges(e.target.result);
        reader.readAsDataURL(fileInput.files[0]);
      } else if (avatarUrl) {
        applyChanges(avatarUrl);
      } else {
        applyChanges(null);
      }
    }

    function showProfileMsg(type, text) {
      var el = document.getElementById('profile-msg');
      el.className = 'add-msg ' + type;
      el.textContent = text;
      el.classList.remove('hidden');
      setTimeout(function() { el.classList.add('hidden'); }, 3000);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !document.getElementById('login-wrap').classList.contains('hidden')) login();
    });

    // Auto-login si session admin active
    (function() {
      const session = JSON.parse(localStorage.getItem('numilion_session') || 'null');
      if (session && session.role === 'admin') {
        // Recharger les infos admin depuis Firebase pour avoir les données à jour
        db.ref('admins/' + session.user).once('value', function(snap) {
          const admin = snap.val();
          const avatar = localStorage.getItem('numilion_avatar_' + session.user) || (admin && admin.avatar) || session.avatar || 'https://i.imgur.com/lRqkh3u.jpeg';
          session.avatar = avatar;
          localStorage.setItem('numilion_session', JSON.stringify(session));
          setAvatar(avatar);
          document.getElementById('login-wrap').classList.add('hidden');
          document.getElementById('panel').classList.remove('hidden');
          startPanel();
        });
      }
    })();
  </script>
  <script src="script.js"></script>
</body>
