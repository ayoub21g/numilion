<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Numilion — Connexion</title>
  <link rel="stylesheet" href="style.css"/>
  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase.js"></script>
  <style>
    .auth-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1; padding: 20px;
    }
    .auth-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px; padding: 40px 36px;
      width: 100%; max-width: 420px;
      backdrop-filter: blur(12px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }
    .auth-logo {
      text-align: center; margin-bottom: 28px;
    }
    .auth-logo img {
      width: 72px; height: 72px; border-radius: 50%;
      filter: drop-shadow(0 0 16px rgba(255,160,0,0.5));
    }
    .auth-logo span {
      display: block; margin-top: 10px; font-size: 1.3rem; font-weight: 700;
      background: linear-gradient(135deg,#e94560,#a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .tabs {
      display: flex; gap: 8px; margin-bottom: 28px;
      background: rgba(255,255,255,0.04); border-radius: 12px; padding: 4px;
    }
    .tab {
      flex: 1; padding: 9px; border-radius: 9px; border: none;
      background: transparent; color: #666; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .tab.active { background: rgba(233,69,96,0.2); color: #e94560; }

    label { display: block; color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 12px 16px; border-radius: 12px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; font-size: 0.95rem; margin-bottom: 16px; font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #e94560; }

    .avatar-pick { text-align: center; margin-bottom: 20px; }
    .avatar-preview {
      width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 10px;
      background: rgba(255,255,255,0.06); border: 2px dashed rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; overflow: hidden; cursor: pointer;
    }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .avatar-pick-btn {
      display: inline-block; padding: 7px 18px; border-radius: 50px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      color: #aaa; font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
    }
    .avatar-pick-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .btn-submit {
      width: 100%; padding: 13px; border-radius: 50px;
      background: linear-gradient(135deg,#e94560,#a855f7);
      color: #fff; border: none; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s; font-family: inherit; margin-top: 4px;
    }
    .btn-submit:hover { opacity: 0.85; }

    .msg { font-size: 0.85rem; padding: 10px 14px; border-radius: 10px; margin-bottom: 14px; }
    .msg.error   { background: rgba(233,69,96,0.1); color: #e94560; border: 1px solid rgba(233,69,96,0.2); }
    .msg.success { background: rgba(46,204,113,0.1); color: #2ecc71; border: 1px solid rgba(46,204,113,0.2); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-logo">
        <img src="standard-2.gif" alt="Numilion"/>
        <span>Numilion</span>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Connexion</button>
        <button class="tab" onclick="switchTab('register')">Inscription</button>
      </div>

      <div id="msg-box" class="msg hidden"></div>

      <!-- CONNEXION -->
      <div id="tab-login">
        <label>Nom d'utilisateur</label>
        <input type="text" id="login-user" placeholder="Ton pseudo"/>
        <label>Mot de passe</label>
        <input type="password" id="login-pass" placeholder="••••••••"/>
        <button class="btn-submit" onclick="doLogin()">Se connecter</button>
      </div>

      <!-- INSCRIPTION -->
      <div id="tab-register" class="hidden">
        <div class="avatar-pick">
          <div class="avatar-preview" id="reg-avatar-preview" onclick="document.getElementById('reg-avatar-input').click()">👤</div>
          <label class="avatar-pick-btn" for="reg-avatar-input">📷 Choisir une photo</label>
          <input type="file" id="reg-avatar-input" accept="image/*" style="display:none" onchange="previewRegAvatar(this)"/>
        </div>
        <label>Nom d'utilisateur</label>
        <input type="text" id="reg-user" placeholder="Choisis un pseudo"/>
        <label>Mot de passe</label>
        <input type="password" id="reg-pass" placeholder="Crée un mot de passe"/>
        <button class="btn-submit" onclick="doRegister()">Créer mon compte</button>
      </div>
    </div>
  </div>

  <script>
    let regAvatarData = null;

    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('tab-register').classList.toggle('hidden', tab !== 'register');
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      hideMsg();
    }

    function showMsg(type, text) {
      const el = document.getElementById('msg-box');
      el.className = 'msg ' + type;
      el.textContent = text;
      el.classList.remove('hidden');
    }
    function hideMsg() {
      document.getElementById('msg-box').classList.add('hidden');
    }

    function previewRegAvatar(input) {
      if (!input.files[0]) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        regAvatarData = e.target.result;
        const el = document.getElementById('reg-avatar-preview');
        el.innerHTML = `<img src="${regAvatarData}" alt="avatar"/>`;
      };
      reader.readAsDataURL(input.files[0]);
    }

    function getUsers() {
      return JSON.parse(localStorage.getItem('numilion_users') || '[]');
    }
    function saveUsers(u) {
      localStorage.setItem('numilion_users', JSON.stringify(u));
    }

    function doLogin() {
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value;
      if (!user || !pass) { showMsg('error', 'Remplis tous les champs.'); return; }

      // Vérifier d'abord si c'est un admin Firebase
      db.ref('admins/' + user).once('value', function(snap) {
        const admin = snap.val();
        if (admin && admin.pass === pass) {
          const avatar = localStorage.getItem('numilion_avatar_' + user) || admin.avatar || 'https://i.imgur.com/lRqkh3u.jpeg';
          localStorage.setItem('numilion_session', JSON.stringify({ user: user, role: 'admin', avatar: avatar }));
          window.location.href = 'index.html';
          return;
        }
        // Sinon vérifier utilisateur normal
        getUserFromFirebase(user, function(found) {
          if (!found || found.pass !== pass) { showMsg('error', 'Identifiants incorrects.'); return; }
          localStorage.setItem('numilion_session', JSON.stringify({ user: found.user, role: 'user', avatar: found.avatar }));
          window.location.href = 'index.html';
        });
      });
    }

    function doRegister() {
      const user = document.getElementById('reg-user').value.trim();
      const pass = document.getElementById('reg-pass').value;
      if (!user || !pass) { showMsg('error', 'Remplis tous les champs.'); return; }
      if (pass.length < 4) { showMsg('error', 'Mot de passe trop court (min 4 caractères).'); return; }
      if (user === ADMIN_USER) { showMsg('error', 'Ce nom d\'utilisateur est réservé.'); return; }

      getUserFromFirebase(user, function(existing) {
        if (existing) { showMsg('error', 'Ce pseudo est déjà pris.'); return; }
        var newUser = { user: user, pass: pass, avatar: regAvatarData };
        saveUserToFirebase(newUser);
        localStorage.setItem('numilion_session', JSON.stringify({ user, role: 'user', avatar: regAvatarData }));
        showMsg('success', 'Compte créé ! Redirection...');
        setTimeout(() => window.location.href = 'index.html', 1000);
      });
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') { if (!document.getElementById('tab-login').classList.contains('hidden')) doLogin(); else doRegister(); }});
  </script>
  <script src="script.js"></script>
</body>
</html>
