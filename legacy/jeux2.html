<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Numilion - Jeux — Page 2</title>
  <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <canvas id="wave-canvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none"></canvas>
  <div class="particles" id="particles"></div>

  <nav>
    <div class="nav-inner">
      <span class="nav-logo"><img src="standard-2.gif" alt="Numilion" style="height:36px;vertical-align:middle;border-radius:50%"/> Numilion</span>
      <div class="nav-links">
        <button onclick="document.getElementById('request-modal').style.display='flex'" class="nav-btn" style="cursor:pointer;border:none;background:rgba(233,69,96,0.15);color:#e94560;border:1px solid rgba(233,69,96,0.3)">🎮 <i data-lucide="gamepad-2" style="width:16px;height:16px;vertical-align:middle;margin-right:6px"></i>Demander un jeu</button>
        <a href="login.html" class="nav-btn" id="nav-login-btn"><i data-lucide="log-in" style="width:14px;height:14px;vertical-align:middle;margin-right:6px"></i>Connexion</a>
        <div id="nav-user"></div>
        <div id="nav-notif" style="display:none;position:relative">
          <button id="notif-btn" style="background:none;border:none;cursor:pointer;font-size:1.3rem;position:relative;padding:4px" onclick="toggleNotif()">🔔<span id="notif-badge" style="display:none;position:absolute;top:0;right:0;background:#e94560;color:#fff;font-size:0.6rem;font-weight:700;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center"></span></button>
          <div id="notif-dropdown" style="display:none;position:absolute;top:48px;right:0;background:#1c1c1c;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:12px;min-width:280px;z-index:200;box-shadow:0 16px 40px rgba(0,0,0,0.5)">
            <div style="font-size:0.85rem;font-weight:600;color:#eee;margin-bottom:10px">🔔<i data-lucide="bell" style="width:14px;height:14px;vertical-align:middle;margin-right:6px"></i> Notifications</div>
            <div id="notif-list"><div style="color:#555;font-size:0.85rem;text-align:center;padding:10px">Aucune notification</div></div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <header>
    <div class="logo">
      <img src="standard-2.gif" alt="Numilion" style="width:90px;height:90px;border-radius:50%;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(255,160,0,0.5))"/>
    </div>
    <h1>Numilion</h1>
    <div class="header-line"></div>
    <div class="header-stats">
      <span>🟢 <b id="count-online">0</b><i data-lucide="circle" style="width:10px;height:10px;fill:#2ecc71;color:#2ecc71;vertical-align:middle;margin-right:4px"></i> en ligne</span>
      <span class="hs-sep">·</span>
      <span>👁 <b id="count-visits">0</b><i data-lucide="eye" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"></i> visites</span>
    </div>
  </header>

  <main>
    <section id="jeux">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="🔍 Rechercher un jeu..." oninput="filterGames(this.value)"/>
      </div>
      <p class="section-title" id="page-title">🕹️ Jeux — Page 2</p>
      <div id="custom-games-section">
        <div class="games-grid" id="custom-games-grid">
          <div class="empty-msg">Chargement...</div>
        </div>
        <div id="pagination" style="display:none;justify-content:center;align-items:center;gap:8px;margin-top:36px;flex-wrap:wrap"></div>
      </div>
    </section>
  </main>

  <!-- Modal connexion obligatoire -->
  <div id="login-required-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(6px)">
    <div style="background:#1a1a1a;border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px 36px;width:100%;max-width:380px;text-align:center;position:relative">
      <button onclick="document.getElementById('login-required-modal').style.display='none'" style="position:absolute;top:16px;right:16px;background:none;border:none;color:#666;font-size:1.3rem;cursor:pointer">✕</button>
      <div style="font-size:3rem;margin-bottom:16px">🔒</div>
      <h3 style="font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:12px">Compte requis</h3>
      <p style="color:#888;font-size:0.9rem;margin-bottom:24px;line-height:1.6">Tu dois avoir un compte pour télécharger des jeux.</p>
      <a href="login.html" style="display:block;padding:13px;border-radius:50px;background:linear-gradient(135deg,#e94560,#a855f7);color:#fff;font-weight:700;font-size:1rem;text-decoration:none;margin-bottom:10px">Se connecter / S'inscrire</a>
      <button onclick="document.getElementById('login-required-modal').style.display='none'" style="background:none;border:none;color:#555;font-size:0.85rem;cursor:pointer;font-family:inherit">Annuler</button>
    </div>
  </div>

  <!-- Modal demande de jeu -->
  <div id="request-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(6px)">
    <div style="background:#1a1a1a;border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:36px;width:100%;max-width:420px;position:relative">
      <button onclick="document.getElementById('request-modal').style.display='none'" style="position:absolute;top:16px;right:16px;background:none;border:none;color:#666;font-size:1.3rem;cursor:pointer">✕</button>
      <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:24px;background:linear-gradient(135deg,#e94560,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">🎮 <i data-lucide="gamepad-2" style="width:16px;height:16px;vertical-align:middle;margin-right:6px"></i>Demander un jeu</h3>
      <div id="req-msg" style="display:none;padding:10px 14px;border-radius:10px;font-size:0.85rem;margin-bottom:14px"></div>
      <label style="display:block;color:#888;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Nom du jeu</label>
      <input type="text" id="req-name" placeholder="Ex: GTA V" style="width:100%;padding:12px 16px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:0.95rem;margin-bottom:16px;font-family:inherit"/>
      <label style="display:block;color:#888;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Image du jeu (URL)</label>
      <input type="text" id="req-img" placeholder="https://..." style="width:100%;padding:12px 16px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:0.95rem;margin-bottom:16px;font-family:inherit"/>
      <label style="display:block;color:#888;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Message (optionnel)</label>
      <input type="text" id="req-msg-text" placeholder="Pourquoi tu veux ce jeu ?" style="width:100%;padding:12px 16px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:0.95rem;margin-bottom:20px;font-family:inherit"/>
      <button onclick="submitRequest()" style="width:100%;padding:13px;border-radius:50px;background:linear-gradient(135deg,#e94560,#a855f7);color:#fff;border:none;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit"><i data-lucide="send" style="width:14px;height:14px;vertical-align:middle;margin-right:6px"></i>Envoyer la demande</button>
    </div>
  </div>

  <footer></footer>

  <style>
    @keyframes slideUp { from{transform:translateY(100px);opacity:0} to{transform:translateY(0);opacity:1} }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="script.js"></script>
  <script>
    // Détecter le numéro de page depuis le nom du fichier
    var PAGE_NUM = parseInt(window.location.pathname.split('jeux')[1]) || 2;
    var GAMES_PER_PAGE = 20;

    document.getElementById('page-title').textContent = '🕹️ Jeux — Page ' + PAGE_NUM;
    document.title = 'Numilion - Jeux — Page ' + PAGE_NUM;

    function checkLogin(e) {
      var session = JSON.parse(localStorage.getItem('numilion_session') || 'null');
      if (session) return true;
      e.preventDefault();
      document.getElementById('login-required-modal').style.display = 'flex';
      return false;
    }

    function makeCard(g) {
      return '<div class="game-card" onclick="window.location.href=\'game.html?id='+g.id+'\'" style="cursor:pointer">'
        + '<div class="game-icon">'
        + (g.img ? '<img src="' + g.img + '" alt="' + g.name + '" style="width:100%;height:180px;object-fit:cover;border-radius:12px;display:block" onerror="this.outerHTML=\'🎮\'"/>' : '🎮')
        + '</div>'
        + '<h2>' + g.name + '</h2>'
        + '<p>' + (g.desc || '') + '</p>'
        + (g.dl ? '<a href="' + g.dl + '" class="dl-btn" onclick="event.stopPropagation();return checkLogin(event, this)">⬇️ Telecharger</a>' : '')
        + '</div>';
    }

    loadGamesFromFirebase(function(games) {
      var grid = document.getElementById('custom-games-grid');
      var start = (PAGE_NUM - 1) * GAMES_PER_PAGE;
      var end   = start + GAMES_PER_PAGE;
      var slice = games.slice(start, end);

      if (!slice.length) {
        grid.innerHTML = '<div class="empty-msg">Aucun jeu sur cette page.</div>';
        return;
      }
      grid.innerHTML = slice.map(makeCard).join('');

      // Pagination
      var totalPages = Math.ceil(games.length / GAMES_PER_PAGE);
      var pag = document.getElementById('pagination');
      if (totalPages > 1) {
        pag.style.display = 'flex';
        var html = '<span class="pag-info">Page ' + PAGE_NUM + ' / ' + totalPages + '</span>';
        for (var i = 1; i <= totalPages; i++) {
          var href = i === 1 ? 'index.html' : 'jeux' + i + '.html';
          html += '<a href="' + href + '" class="pag-btn' + (i === PAGE_NUM ? ' active' : '') + '">' + i + '</a>';
        }
        pag.innerHTML = html;
      }
    });

    trackVisit();

    function submitRequest() {
      var name = document.getElementById('req-name').value.trim();
      var img  = document.getElementById('req-img').value.trim();
      var msg  = document.getElementById('req-msg-text').value.trim();
      var msgBox = document.getElementById('req-msg');
      if (!name) { msgBox.style.cssText='display:block;background:rgba(233,69,96,0.1);color:#e94560;border:1px solid rgba(233,69,96,0.2)'; msgBox.textContent='Le nom est obligatoire.'; return; }
      var session = JSON.parse(localStorage.getItem('numilion_session')||'null');
      var request = { id: Date.now(), name, img, msg, user: session ? session.user : 'Visiteur', status: 'pending', date: new Date().toLocaleDateString('fr-FR') };
      firebase.database().ref('requests/'+request.id).set(request);
      msgBox.style.cssText='display:block;background:rgba(46,204,113,0.1);color:#2ecc71;border:1px solid rgba(46,204,113,0.2)';
      msgBox.textContent='Demande envoyée !';
      setTimeout(function(){ document.getElementById('request-modal').style.display='none'; msgBox.style.display='none'; document.getElementById('req-name').value=''; document.getElementById('req-img').value=''; document.getElementById('req-msg-text').value=''; }, 1500);
    }

    //<i data-lucide="bell" style="width:14px;height:14px;vertical-align:middle;margin-right:6px"></i> Notifications
    function toggleNotif() { var dd=document.getElementById('notif-dropdown'); dd.style.display=dd.style.display==='none'?'block':'none'; }
    document.addEventListener('click',function(e){ if(!document.getElementById('nav-notif').contains(e.target)){var dd=document.getElementById('notif-dropdown');if(dd)dd.style.display='none';}});
    (function(){
      var session=JSON.parse(localStorage.getItem('numilion_session')||'null');
      if(!session||session.role==='admin')return;
      document.getElementById('nav-notif').style.display='block';
      firebase.database().ref('notifications/'+session.user).on('value',function(snap){
        var notifs=[]; snap.forEach(function(c){notifs.push({key:c.key,val:c.val()})});
        var unread=notifs.filter(function(n){return!n.val.read}).length;
        var badge=document.getElementById('notif-badge');
        badge.style.display=unread>0?'flex':'none'; if(unread>0)badge.textContent=unread;
        var list=document.getElementById('notif-list');
        if(!notifs.length){list.innerHTML='<div style="color:#555;font-size:0.85rem;text-align:center;padding:10px">Aucune notification</div>';return;}
        list.innerHTML=notifs.reverse().map(function(n){var v=n.val;var isA=v.type==='accepte';var col=isA?'46,204,113':'233,69,96';return'<div style="padding:10px;border-radius:10px;background:rgba('+col+',0.08);border:1px solid rgba('+col+',0.2);margin-bottom:8px"><div style="font-size:0.85rem;color:#eee;font-weight:600">'+(isA?'✅ Acceptée':'❌ Refusée')+' : '+v.game+'</div><div style="font-size:0.78rem;color:#888;margin-top:4px">'+v.comment+'</div><div style="font-size:0.72rem;color:#555;margin-top:4px">'+v.date+'</div></div>';}).join('');
        notifs.forEach(function(n){if(!n.val.read)firebase.database().ref('notifications/'+session.user+'/'+n.key).update({read:true})});
      });
    })();
  </script>
  <script>
  (function(){
    var c=document.getElementById('wave-canvas'),ctx=c.getContext('2d'),t=0,lines=[];
    function resize(){c.width=window.innerWidth;c.height=window.innerHeight;lines=[];for(var i=0;i<120;i++)lines.push({angle:(Math.PI*2/120)*i,speed:0.2+Math.random()*0.6,len:0.3+Math.random()*0.7,width:0.5+Math.random()*2,offset:Math.random()*100});}
    resize();window.addEventListener('resize',resize);
    function draw(){var w=c.width,h=c.height,cx=w/2,cy=h/2,maxR=Math.sqrt(cx*cx+cy*cy);ctx.fillStyle='#0d0d0d';ctx.fillRect(0,0,w,h);lines.forEach(function(l){var p=((t*l.speed+l.offset)%100)/100,r1=maxR*p,r2=maxR*(p+l.len*0.15),a=Math.sin(p*Math.PI)*0.5;ctx.beginPath();ctx.moveTo(cx+Math.cos(l.angle)*r1,cy+Math.sin(l.angle)*r1);ctx.lineTo(cx+Math.cos(l.angle)*r2,cy+Math.sin(l.angle)*r2);ctx.strokeStyle='rgba(255,255,255,'+a+')';ctx.lineWidth=l.width;ctx.stroke();});t+=0.08;requestAnimationFrame(draw);}
    draw();
  })();
  </script>
  <script>
    (function(){
      var session=JSON.parse(localStorage.getItem('numilion_session')||'null');
      if(!session)return;
      var loginBtn=document.getElementById('nav-login-btn');
      var navUser=document.getElementById('nav-user');
      if(loginBtn)loginBtn.style.display='none';
      var avatar=session.avatar||(session.role==='admin'?(localStorage.getItem('numilion_avatar')||'https://i.imgur.com/lRqkh3u.jpeg'):null);
      var avatarHTML=avatar?'<img src="'+avatar+'" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>':'👤';
      var adminLink=session.role==='admin'?'<a href="admin.html">Panel Admin</a>':'';
      navUser.innerHTML='<div class="profile-wrap" id="profile-wrap"><div class="profile-avatar-btn" id="avatar-btn">'+avatarHTML+'</div><div class="profile-dropdown" id="profile-dropdown"><div class="pd-name">👋 '+session.user+'</div>'+adminLink+(session.role!=='admin'?'<a href="profil.html">⚙️ Mon Profil</a>':'')+'<button class="pd-logout" onclick="localStorage.removeItem(\'numilion_session\');window.location.href=\'login.html\'"><i data-lucide="log-out" style="width:14px;height:14px;vertical-align:middle;margin-right:6px"></i>Déconnexion</button></div></div>';
      document.getElementById('avatar-btn').addEventListener('click',function(e){e.stopPropagation();document.getElementById('profile-dropdown').classList.toggle('open');});
      document.addEventListener('click',function(){var dd=document.getElementById('profile-dropdown');if(dd)dd.classList.remove('open');});
    })();
  </script>
<script>lucide.createIcons();</script>
</body>
</html>
