<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Numilion - Jeux Gratuits</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="particles" id="particles"></div>

  <nav>
    <div class="nav-inner">
      <span class="nav-logo"><img src="standard-2.gif" alt="Numilion" style="height:36px;vertical-align:middle;border-radius:50%"/> Numilion</span>
      <div class="nav-links">
        <a href="#jeux" class="nav-btn">Jeux</a>
        <a href="login.html" class="nav-btn" id="nav-login-btn">Connexion</a>
        <div id="nav-user"></div>
      </div>
    </div>
  </nav>

  <header>
    <div class="logo">
      <img src="standard-2.gif" alt="Numilion" style="width:90px;height:90px;border-radius:50%;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(255,160,0,0.5))"/>
    </div>
    <h1>Numilion</h1>
    <p>Jeux gratuits directement dans ton navigateur</p>
    <div class="header-line"></div>
    <div class="header-stats">
      <span id="hs-online">🟢 <b id="count-online">0</b> en ligne</span>
      <span class="hs-sep">·</span>
      <span>👁 <b id="count-visits">0</b> visites</span>
    </div>
  </header>

  <main>
    <section id="jeux">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="🔍 Rechercher un jeu..." oninput="filterGames(this.value)"/>
      </div>
      <p class="section-title">🕹️ Tous les jeux</p>
      <div id="custom-games-section">
        <div class="games-grid" id="custom-games-grid">
          <div class="empty-msg">Aucun jeu ajouté. Va dans le panel admin pour en ajouter.</div>
        </div>
      </div>
      <div style="text-align:center;margin-top:40px">
        <button onclick="document.getElementById('request-modal').style.display='flex'" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:#ccc;padding:12px 28px;border-radius:50px;font-size:0.95rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s" onmouseover="this.style.background='rgba(233,69,96,0.15)';this.style.borderColor='rgba(233,69,96,0.4)';this.style.color='#e94560'" onmouseout="this.style.background='rgba(255,255,255,0.05)';this.style.borderColor='rgba(255,255,255,0.15)';this.style.color='#ccc'">🎮 Demander un jeu</button>
      </div>
    </section>
  </main>

  <!-- Modal demande de jeu -->
  <div id="request-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(6px)">
    <div style="background:#1a1a1a;border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:36px;width:100%;max-width:420px;position:relative">
      <button onclick="document.getElementById('request-modal').style.display='none'" style="position:absolute;top:16px;right:16px;background:none;border:none;color:#666;font-size:1.3rem;cursor:pointer">✕</button>
      <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:24px;background:linear-gradient(135deg,#e94560,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">🎮 Demander un jeu</h3>
      <div id="req-msg" style="display:none;padding:10px 14px;border-radius:10px;font-size:0.85rem;margin-bottom:14px"></div>
      <label style="display:block;color:#888;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Nom du jeu</label>
      <input type="text" id="req-name" placeholder="Ex: GTA V" style="width:100%;padding:12px 16px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:0.95rem;margin-bottom:16px;font-family:inherit"/>
      <label style="display:block;color:#888;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Image du jeu (URL)</label>
      <input type="text" id="req-img" placeholder="https://..." style="width:100%;padding:12px 16px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:0.95rem;margin-bottom:16px;font-family:inherit"/>
      <label style="display:block;color:#888;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Message (optionnel)</label>
      <input type="text" id="req-msg-text" placeholder="Pourquoi tu veux ce jeu ?" style="width:100%;padding:12px 16px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:0.95rem;margin-bottom:20px;font-family:inherit"/>
      <button onclick="submitRequest()" style="width:100%;padding:13px;border-radius:50px;background:linear-gradient(135deg,#e94560,#a855f7);color:#fff;border:none;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit">Envoyer la demande</button>
    </div>
  </div>

  <footer></footer>

  <!-- Popup Discord -->
  <div id="discord-popup" style="position:fixed;bottom:24px;right:24px;z-index:999;background:#5865F2;border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(88,101,242,0.4);animation:slideUp 0.5s ease;max-width:280px;">
    <svg width="36" height="36" viewBox="0 0 127.14 96.36" style="flex-shrink:0" fill="#fff" xmlns="http://www.w3.org/2000/svg"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
    <div style="flex:1">
      <div style="font-weight:700;font-size:0.9rem;color:#fff">Rejoins le Discord !</div>
      <div style="font-size:0.78rem;color:rgba(255,255,255,0.7);margin-top:2px">Communauté Numilion</div>
    </div>
    <a href="https://discord.gg/MK4a8PKDjn" target="_blank" rel="noopener" style="background:white;color:#5865F2;font-weight:700;font-size:0.8rem;padding:7px 14px;border-radius:50px;text-decoration:none;flex-shrink:0">Rejoindre</a>
    <button onclick="document.getElementById('discord-popup').style.display='none'" style="background:none;border:none;color:rgba(255,255,255,0.6);font-size:1.1rem;cursor:pointer;padding:0;margin-left:4px;flex-shrink:0">✕</button>
  </div>
  <style>
    @keyframes slideUp {
      from { transform: translateY(100px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="script.js"></script>
  <script>
    function submitRequest() {
      var name = document.getElementById('req-name').value.trim();
      var img  = document.getElementById('req-img').value.trim();
      var msg  = document.getElementById('req-msg-text').value.trim();
      var msgBox = document.getElementById('req-msg');
      if (!name) {
        msgBox.style.display='block';
        msgBox.style.background='rgba(233,69,96,0.1)';
        msgBox.style.color='#e94560';
        msgBox.style.border='1px solid rgba(233,69,96,0.2)';
        msgBox.textContent='Le nom du jeu est obligatoire.';
        return;
      }
      var session = JSON.parse(localStorage.getItem('numilion_session')||'null');
      var request = { id: Date.now(), name: name, img: img, msg: msg, user: session ? session.user : 'Visiteur', status: 'pending', date: new Date().toLocaleDateString('fr-FR') };
      firebase.database().ref('requests/'+request.id).set(request);
      msgBox.style.display='block';
      msgBox.style.background='rgba(46,204,113,0.1)';
      msgBox.style.color='#2ecc71';
      msgBox.style.border='1px solid rgba(46,204,113,0.2)';
      msgBox.textContent='Demande envoyée !';
      setTimeout(function(){ document.getElementById('request-modal').style.display='none'; msgBox.style.display='none'; document.getElementById('req-name').value=''; document.getElementById('req-img').value=''; document.getElementById('req-msg-text').value=''; }, 1500);
    }

    loadGamesFromFirebase(function(games) {
      var grid = document.getElementById('custom-games-grid');
      if (!games || games.length === 0) {
        grid.innerHTML = '<div class="empty-msg">Aucun jeu ajouté.</div>';
        return;
      }
      grid.innerHTML = games.map(function(g) {
        return '<div class="game-card">'
          + '<div class="game-icon">'
          + (g.img ? '<img src="' + g.img + '" alt="' + g.name + '" style="width:100%;height:180px;object-fit:cover;border-radius:12px;display:block" onerror="this.outerHTML=\'🎮\'"/>' : '🎮')
          + '</div>'
          + '<h2>' + g.name + '</h2>'
          + '<p>' + (g.desc || '') + '</p>'
          + (g.dl ? '<a href="' + g.dl + '" class="dl-btn">⬇️ Telecharger</a>' : '')
          + '</div>';
      }).join('');
    });
    trackVisit();
  </script>
  <script>
    (function() {
      var session = JSON.parse(localStorage.getItem('numilion_session') || 'null');
      if (!session) return;

      var loginBtn = document.getElementById('nav-login-btn');
      var navUser  = document.getElementById('nav-user');
      if (loginBtn) loginBtn.style.display = 'none';

      // Chercher la photo dans la session, sinon dans numilion_avatar (admin)
      var avatar = session.avatar || (session.role === 'admin' ? (localStorage.getItem('numilion_avatar') || 'https://i.imgur.com/lRqkh3u.jpeg') : null);
      var avatarHTML = avatar ? '<img src="' + avatar + '" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>' : '👤';
      var adminLink  = session.role === 'admin' ? '<a href="admin.html">Panel Admin</a>' : '';

      navUser.innerHTML = '<div class="profile-wrap" id="profile-wrap">'
        + '<div class="profile-avatar-btn" id="avatar-btn">' + avatarHTML + '</div>'
        + '<div class="profile-dropdown" id="profile-dropdown">'
        + '<div class="pd-name">👋 ' + session.user + '</div>'
        + adminLink
        + '<button class="pd-logout" onclick="localStorage.removeItem(\'numilion_session\');window.location.href=\'login.html\'">Déconnexion</button>'
        + '</div></div>';

      document.getElementById('avatar-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        document.getElementById('profile-dropdown').classList.toggle('open');
      });

      document.addEventListener('click', function() {
        var dd = document.getElementById('profile-dropdown');
        if (dd) dd.classList.remove('open');
      });
    })();
  </script>
</body>
</html>
